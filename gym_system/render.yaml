services:
  - type: web
    name: gymsystem
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:application --workers 1 --threads 4 --worker-class gthread --timeout 120 --bind 0.0.0.0:$PORT --log-level warning
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false   # <-- se define manualmente en el dashboard de Render, NO en este archivo
