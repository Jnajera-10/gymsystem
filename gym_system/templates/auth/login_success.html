<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso exitoso</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 36px 40px;
    width: 460px;
    max-width: 95vw;
    backdrop-filter: blur(12px);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .subtitle {
    color: #aaa;
    font-size: 13px;
    margin-bottom: 20px;
  }
  #anim-svg {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
    overflow: visible;
  }
  .progress-wrap {
    margin-top: 16px;
  }
  .progress-label {
    color: #888;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .progress-track {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    height: 6px;
    overflow: hidden;
  }
  #prog-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #f0b429, #f59e0b);
    border-radius: 8px;
    transition: width 0.05s linear;
  }
  #pct-label {
    color: #f0b429;
    font-size: 12px;
    margin-top: 4px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="card">
  <h1 id="welcome-title">¡Bienvenido!</h1>
  <p class="subtitle" id="anim-subtitle">Preparando tu sesión...</p>

  <svg id="anim-svg" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="250" fill="#12122a" rx="10"/>
    <rect x="0" y="210" width="400" height="40" fill="#0e0e22" rx="0"/>
    <line x1="0" y1="210" x2="400" y2="210" stroke="#1e1e4a" stroke-width="2"/>

    <!-- PRESS BANCA GROUP -->
    <g id="bench-group">
      <rect x="100" y="178" width="200" height="16" fill="#5a3e28" rx="4"/>
      <rect x="128" y="192" width="18" height="18" fill="#4a3020" rx="2"/>
      <rect x="254" y="192" width="18" height="18" fill="#4a3020" rx="2"/>
      <rect x="140" y="152" width="8" height="28" fill="#777" rx="2"/>
      <rect x="252" y="152" width="8" height="28" fill="#777" rx="2"/>
      <g id="bench-athlete">
        <rect x="153" y="160" width="92" height="20" fill="#3a7bd5" rx="6"/>
        <circle cx="258" cy="168" r="13" fill="#f0c27f"/>
        <ellipse cx="258" cy="158" rx="11" ry="6" fill="#3d2b1f"/>
        <rect x="108" y="173" width="52" height="11" fill="#2c5aa0" rx="4"/>
        <rect x="106" y="172" width="14" height="10" fill="#333" rx="3"/>
        <ellipse cx="186" cy="164" rx="13" ry="7" fill="#4a90d9" opacity="0.7"/>
        <ellipse cx="214" cy="164" rx="13" ry="7" fill="#4a90d9" opacity="0.7"/>
        <g id="ba-lift">
          <rect id="ba-arm-l" x="160" y="140" width="12" height="26" fill="#f0c27f" rx="4"/>
          <rect id="ba-arm-r" x="220" y="140" width="12" height="26" fill="#f0c27f" rx="4"/>
          <rect id="ba-bar" x="138" y="135" width="124" height="7" fill="#ccc" rx="3"/>
          <rect id="ba-dl1" x="134" y="130" width="10" height="17" fill="#e55" rx="2"/>
          <rect id="ba-dl2" x="125" y="132" width="8" height="13" fill="#c33" rx="2"/>
          <rect id="ba-dr1" x="256" y="130" width="10" height="17" fill="#e55" rx="2"/>
          <rect id="ba-dr2" x="267" y="132" width="8" height="13" fill="#c33" rx="2"/>
        </g>
      </g>
      <g id="bench-effort" opacity="0">
        <text x="290" y="148" font-size="16" fill="#f0b429" font-family="sans-serif">💪</text>
        <text x="72" y="148" font-size="13" fill="#f0b429" font-family="sans-serif" font-weight="700">REP!</text>
      </g>
    </g>

    <!-- SENTADILLA GROUP -->
    <g id="squat-group" display="none">
      <g id="sq-bar-grp">
        <rect x="130" y="112" width="140" height="7" fill="#ccc" rx="3"/>
        <rect x="126" y="107" width="10" height="17" fill="#e55" rx="2"/>
        <rect x="117" y="109" width="8" height="13" fill="#c33" rx="2"/>
        <rect x="264" y="107" width="10" height="17" fill="#e55" rx="2"/>
        <rect x="274" y="109" width="8" height="13" fill="#c33" rx="2"/>
      </g>
      <g id="sq-athlete">
        <circle id="sq-head" cx="200" cy="92" r="15" fill="#f0c27f"/>
        <ellipse cx="200" cy="81" rx="13" ry="7" fill="#3d2b1f"/>
        <rect id="sq-torso" x="178" y="106" width="44" height="48" fill="#3a7bd5" rx="6"/>
        <ellipse id="sq-pec-l" cx="192" cy="122" rx="10" ry="7" fill="#4a90d9" opacity="0.7"/>
        <ellipse id="sq-pec-r" cx="208" cy="122" rx="10" ry="7" fill="#4a90d9" opacity="0.7"/>
        <rect id="sq-arm-l" x="148" y="112" width="32" height="10" fill="#f0c27f" rx="4"/>
        <rect id="sq-arm-r" x="220" y="112" width="32" height="10" fill="#f0c27f" rx="4"/>
        <rect x="148" y="111" width="10" height="12" fill="#f0b429" rx="2" opacity="0.8"/>
        <rect x="242" y="111" width="10" height="12" fill="#f0b429" rx="2" opacity="0.8"/>
        <rect id="sq-hip" x="172" y="150" width="56" height="18" fill="#2c5aa0" rx="5"/>
        <rect id="sq-thl" x="155" y="156" width="24" height="45" fill="#2c5aa0" rx="6" transform="rotate(28,167,178)"/>
        <rect id="sq-thr" x="221" y="156" width="24" height="45" fill="#2c5aa0" rx="6" transform="rotate(-28,233,178)"/>
        <rect id="sq-cfl" x="136" y="188" width="19" height="25" fill="#264d8c" rx="5"/>
        <rect id="sq-cfr" x="245" y="188" width="19" height="25" fill="#264d8c" rx="5"/>
        <rect x="128" y="210" width="27" height="7" fill="#333" rx="3"/>
        <rect x="245" y="210" width="27" height="7" fill="#333" rx="3"/>
      </g>
      <g id="squat-effort" opacity="0">
        <text x="298" y="108" font-size="16" fill="#f0b429" font-family="sans-serif">💪</text>
        <text x="60" y="108" font-size="13" fill="#f0b429" font-family="sans-serif" font-weight="700">REP!</text>
      </g>
    </g>

    <!-- Texto central celebración -->
    <text id="cel-text" x="200" y="110" fill="#f0b429" font-size="0" font-weight="700" text-anchor="middle" font-family="'Segoe UI', sans-serif"></text>
  </svg>

  <div class="progress-wrap">
    <div class="progress-label" id="prog-label">Cargando...</div>
    <div class="progress-track"><div id="prog-fill"></div></div>
    <div id="pct-label">0%</div>
  </div>
</div>

<script>
  // Inyectar nombre de usuario desde Jinja (Flask)
  const userName = "{{ username }}";
  document.getElementById('welcome-title').textContent = "¡Bienvenido, " + userName + "!";

  // Elegir animación aleatoriamente
  const useBench = Math.random() < 0.5;

  const benchGroup = document.getElementById('bench-group');
  const squatGroup = document.getElementById('squat-group');
  const celText    = document.getElementById('cel-text');
  const progFill   = document.getElementById('prog-fill');
  const pctLabel   = document.getElementById('pct-label');
  const progLabel  = document.getElementById('prog-label');
  const animSub    = document.getElementById('anim-subtitle');

  let timers = [];
  function later(fn, ms) { timers.push(setTimeout(fn, ms)); }

  function setProgress(pct) {
    progFill.style.width = pct + '%';
    pctLabel.textContent = Math.round(pct) + '%';
  }

  function smoothProg(from, to, dur, cb) {
    const s = performance.now();
    function step(now) {
      let t = Math.min((now - s) / dur, 1);
      let e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      setProgress(from + (to - from) * e);
      if (t < 1) requestAnimationFrame(step);
      else if (cb) cb();
    }
    requestAnimationFrame(step);
  }

  function showCelebration(txt) {
    celText.textContent = txt;
    const s = performance.now();
    function grow(now) {
      let t = Math.min((now - s)/350, 1);
      celText.setAttribute('font-size', t * 38);
      if (t < 1) requestAnimationFrame(grow);
      else later(() => {
        const s2 = performance.now();
        function shrink(now2) {
          let t2 = Math.min((now2 - s2)/300, 1);
          celText.setAttribute('font-size', (1 - t2) * 38);
          if (t2 < 1) requestAnimationFrame(shrink);
        }
        requestAnimationFrame(shrink);
      }, 700);
    }
    requestAnimationFrame(grow);
  }

  /* ---- PRESS BANCA ---- */
  function animBenchBar(goUp, dur, cb) {
    const barEl   = document.getElementById('ba-bar');
    const alEl    = document.getElementById('ba-arm-l');
    const arEl    = document.getElementById('ba-arm-r');
    const dl1 = document.getElementById('ba-dl1');
    const dl2 = document.getElementById('ba-dl2');
    const dr1 = document.getElementById('ba-dr1');
    const dr2 = document.getElementById('ba-dr2');
    const fromY = goUp ? 155 : 135;
    const toY   = goUp ? 135 : 155;
    const s = performance.now();
    function step(now) {
      let t = Math.min((now - s)/dur, 1);
      let e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      const y = fromY + (toY - fromY) * e;
      barEl.setAttribute('y', y);
      dl1.setAttribute('y', y - 5); dl2.setAttribute('y', y - 3);
      dr1.setAttribute('y', y - 5); dr2.setAttribute('y', y - 3);
      const armH = goUp ? (10 + 16 * e) : (26 - 16 * e);
      const armY = goUp ? (155 - armH + 10) : (155 - armH + 10);
      alEl.setAttribute('height', armH); alEl.setAttribute('y', y - armH + 2);
      arEl.setAttribute('height', armH); arEl.setAttribute('y', y - armH + 2);
      if (t < 1) requestAnimationFrame(step);
      else if (cb) cb();
    }
    requestAnimationFrame(step);
  }

  function runBench() {
    animSub.textContent = 'Press banca — ¡dale con todo!';
    progLabel.textContent = 'Preparando sesión...';
    benchGroup.removeAttribute('display');
    squatGroup.setAttribute('display','none');
    document.getElementById('bench-effort').setAttribute('opacity','0');
    celText.setAttribute('font-size', 0);
    setProgress(0);

    function rep(delay, onDone) {
      later(() => {
        animBenchBar(false, 520, () => {
          later(() => {
            animBenchBar(true, 480, () => {
              document.getElementById('bench-effort').setAttribute('opacity','1');
              later(() => document.getElementById('bench-effort').setAttribute('opacity','0'), 380);
              if (onDone) onDone();
            });
          }, 160);
        });
      }, delay);
    }

    smoothProg(0, 30, 900);
    rep(300, () => {
      smoothProg(30, 65, 900);
      rep(1100, () => {
        smoothProg(65, 90, 700);
        rep(2000, () => {
          showCelebration('¡RÉCORD! 💪');
          smoothProg(90, 100, 600, () => {
            later(() => { window.location.href = "{{ redirect_url }}"; }, 1000);
          });
        });
      });
    });
  }

  /* ---- SENTADILLA ---- */
  function animSquat(goDown, dur, cb) {
    const hipEl  = document.getElementById('sq-hip');
    const torsEl = document.getElementById('sq-torso');
    const headEl = document.getElementById('sq-head');
    const pL     = document.getElementById('sq-pec-l');
    const pR     = document.getElementById('sq-pec-r');
    const alEl   = document.getElementById('sq-arm-l');
    const arEl   = document.getElementById('sq-arm-r');
    const bGrp   = document.getElementById('sq-bar-grp');
    const fromH  = goDown ? 150 : 168;
    const toH    = goDown ? 168 : 150;
    const s = performance.now();
    function step(now) {
      let t = Math.min((now - s)/dur, 1);
      let e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      const hy = fromH + (toH - fromH) * e;
      hipEl.setAttribute('y', hy);
      torsEl.setAttribute('y', hy - 44);
      headEl.setAttribute('cy', hy - 72);
      pL.setAttribute('cy', hy - 29); pR.setAttribute('cy', hy - 29);
      const barY = hy - 44;
      bGrp.setAttribute('transform', `translate(0,${barY - 106})`);
      alEl.setAttribute('y', barY + 6); arEl.setAttribute('y', barY + 6);
      if (t < 1) requestAnimationFrame(step);
      else if (cb) cb();
    }
    requestAnimationFrame(step);
  }

  function runSquat() {
    animSub.textContent = 'Sentadilla — ¡profunda y potente!';
    progLabel.textContent = 'Preparando sesión...';
    squatGroup.removeAttribute('display');
    benchGroup.setAttribute('display','none');
    document.getElementById('squat-effort').setAttribute('opacity','0');
    celText.setAttribute('font-size', 0);
    setProgress(0);

    function rep(delay, onDone) {
      later(() => {
        animSquat(true, 580, () => {
          later(() => {
            animSquat(false, 520, () => {
              document.getElementById('squat-effort').setAttribute('opacity','1');
              later(() => document.getElementById('squat-effort').setAttribute('opacity','0'), 380);
              if (onDone) onDone();
            });
          }, 170);
        });
      }, delay);
    }

    smoothProg(0, 30, 900);
    rep(300, () => {
      smoothProg(30, 65, 900);
      rep(1200, () => {
        smoothProg(65, 90, 700);
        rep(2100, () => {
          showCelebration('¡PERSONAL BEST! 🏋️');
          smoothProg(90, 100, 600, () => {
            later(() => { window.location.href = "{{ redirect_url }}"; }, 1000);
          });
        });
      });
    });
  }

  // Ejecutar animación aleatoria
  if (useBench) runBench(); else runSquat();
</script>
</body>
</html>
