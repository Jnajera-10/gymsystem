<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body-Fit</title>
    <meta http-equiv="refresh" content="10;url={{ url_for('dashboard.index') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* Resplandor cenital sutil detrás del texto */
        .glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 50% 40% at 50% 50%, rgba(247,201,72,0.10) 0%, transparent 65%);
            pointer-events: none;
        }

        /* ── Texto BODYFIT ──
           Color sólido dorado como base garantizada (siempre visible,
           incluso si el navegador no soporta degradado en texto o si
           la animación no llega a ejecutarse). El degradado y el fade-in
           son solo una mejora encima de esa base. */
        .brand {
            font-family: 'Bebas Neue', 'Inter', sans-serif;
            font-size: clamp(3rem, 12vw, 7rem);
            letter-spacing: 0.12em;
            color: #f7c948;
            filter: drop-shadow(0 0 30px rgba(247,201,72,0.35));
            animation: reveal 1.1s ease forwards 0.15s;
        }
        @supports (background-clip: text) or (-webkit-background-clip: text) {
            .brand {
                background: linear-gradient(135deg, #ffe9a8 0%, #f7c948 45%, #d89a1a 100%);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }
        }

        .brand-sub {
            margin-top: 14px;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(247,201,72,0.55);
            animation: reveal 1s ease forwards 0.6s;
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Barra de carga */
        .loader-track {
            margin-top: 40px;
            width: 200px;
            height: 3px;
            border-radius: 3px;
            background: rgba(247,201,72,0.12);
            overflow: hidden;
        }
        .loader-fill {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            background: linear-gradient(90deg, #f7c948, #ffe9a8);
            animation: fill 10s linear forwards;
        }
        @keyframes fill {
            from { width: 0%; }
            to   { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="brand">BODYFIT</div>
    <div class="brand-sub">Preparando tu sistema</div>
    <div class="loader-track"><div class="loader-fill"></div></div>

    <script>
        setTimeout(function () {
            window.location.href = "{{ url_for('dashboard.index') }}";
        }, 10000);
    </script>
</body>
</html>
