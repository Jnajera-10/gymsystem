{% extends "layouts/base.html" %}
{% block title %}{{ 'Editar' if membership else 'Nueva' }} Membresía{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="fas fa-id-card me-2"></i>{{ 'Editar' if membership else 'Nueva' }} Membresía</h4>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre *</label>
                    <input type="text" name="name" class="form-control" required value="{{ membership.name if membership else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Duración (días) *</label>
                    <input type="number" name="duration_days" class="form-control" required min="1" value="{{ membership.duration_days if membership else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Precio *</label>
                    <input type="number" name="price" class="form-control" required min="0" step="0.01" value="{{ membership.price if membership else '' }}">
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="{{ url_for('membership.index') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
