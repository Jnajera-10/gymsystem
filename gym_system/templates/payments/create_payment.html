{% extends "layouts/base.html" %}
{% block title %}Nuevo Pago{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="fas fa-money-bill me-2"></i>Registrar Pago</h4>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Cliente *</label>
                    <select name="client_id" class="form-select" required>
                        <option value="">Selecciona cliente...</option>
                        {% for c in clients %}
                        <option value="{{ c.id }}">{{ c.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Membresía *</label>
                    <select name="membership_id" id="membership_id" class="form-select" required>
                        <option value="">Selecciona membresía...</option>
                        {% for m in memberships %}
                        <option value="{{ m.id }}" data-price="{{ m.price }}">{{ m.name }} - ${{ '{:,.0f}'.format(m.price) }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Monto *</label>
                    <input type="number" name="amount" id="amount" class="form-control" required min="0" step="0.01">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Fecha de Inicio *</label>
                    <input type="date" name="start_date" class="form-control" required value="{{ today }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Método de Pago</label>
                    <select name="payment_method" class="form-select">
                        <option value="efectivo">Efectivo</option>
                        <option value="transferencia">Transferencia</option>
                        <option value="tarjeta">Tarjeta</option>
                        <option value="nequi">Nequi</option>
                        <option value="daviplata">Daviplata</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Observaciones</label>
                    <textarea name="notes" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Registrar Pago</button>
                    <a href="{{ url_for('payments.index') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('membership_id').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    if (opt.dataset.price) document.getElementById('amount').value = opt.dataset.price;
});
</script>
{% endblock %}
