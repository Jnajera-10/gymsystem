{% extends "layouts/base.html" %}
{% block title %}Nueva Venta{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="fas fa-shopping-cart me-2"></i>Nueva Venta</h4>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Cliente (opcional)</label>
                    <select name="client_id" class="form-select">
                        <option value="">Cliente general</option>
                        {% for c in clients %}
                        <option value="{{ c.id }}">{{ c.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Método de Pago</label>
                    <select name="payment_method" class="form-select">
                        <option value="efectivo">Efectivo</option>
                        <option value="transferencia">Transferencia</option>
                        <option value="nequi">Nequi</option>
                        <option value="daviplata">Daviplata</option>
                        <option value="tarjeta">Tarjeta</option>
                    </select>
                </div>
            </div>
            <h6 class="fw-bold mb-2">Productos</h6>
            <table class="table table-bordered">
                <thead class="table-light"><tr><th>Producto</th><th>Stock</th><th>Precio</th><th>Cantidad</th></tr></thead>
                <tbody>
                    {% for p in products %}
                    <tr>
                        <td>{{ p.name }}<input type="hidden" name="product_id" value="{{ p.id }}"></td>
                        <td>{{ p.quantity }}</td>
                        <td>${{ '{:,.0f}'.format(p.sale_price) }}</td>
                        <td><input type="number" name="quantity" class="form-control form-control-sm" value="0" min="0" max="{{ p.quantity }}" style="width:80px"></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-success">Registrar Venta</button>
                <a href="{{ url_for('sales.index') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
