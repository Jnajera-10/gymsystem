{% extends "layouts/base.html" %}
{% block title %}Configuración{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="fas fa-cog me-2"></i>Configuración del Gimnasio</h4>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre del Gimnasio</label>
                    <input type="text" name="gym_name" class="form-control" value="{{ settings.gym_name or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="phone" class="form-control" value="{{ settings.phone or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo</label>
                    <input type="email" name="email" class="form-control" value="{{ settings.email or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Dirección</label>
                    <input type="text" name="address" class="form-control" value="{{ settings.address or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Instagram</label>
                    <input type="text" name="instagram" class="form-control" value="{{ settings.instagram or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Facebook</label>
                    <input type="text" name="facebook" class="form-control" value="{{ settings.facebook or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">WhatsApp</label>
                    <input type="text" name="whatsapp" class="form-control" value="{{ settings.whatsapp or '' }}">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Guardar Configuración</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
